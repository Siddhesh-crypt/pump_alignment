workflows:
  ios-release-workflow:
    name: Pump Alignment iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'master'
          include: true
    scripts:
      - name: Initialize and Fetch Dependencies
        script: |
          flutter pub get

      - name: Build iOS App Bundle
        script: |
          # Code compile check for non-signed environment
          flutter build ios --release --no-codesign

      - name: Packaging .app to .ipa Custom Payload
        script: |
          # Standard structure packaging execution
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r pump_alignment.ipa Payload
    artifacts:
      - "*.ipa"